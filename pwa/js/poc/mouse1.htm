<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highlight Elements</title>
    <style>
        body, div {
            border: 2px solid white;
        }
        .highlight {
            border: 2px solid red;
        }
    </style>
</head>
<body>
    <div style="width: 100px; height: 100px; background-color: lightblue; margin: 20px;">Box 1</div>
    <div style="width: 100px; height: 100px; background-color: lightgreen; margin: 20px;">Box 2</div>
    <div style="width: 100px; height: 100px; background-color: lightcoral; margin: 20px;">Box 3</div>

    <script>
        let currentElement = null;

        document.addEventListener('mousemove', function(event) {
            const element = document.elementFromPoint(event.clientX, event.clientY);

            if (currentElement && currentElement !== element) {
                currentElement.classList.remove('highlight');
            }

            if (element) {
                element.classList.add('highlight');
                currentElement = element;
            }
        });
    </script>
</body>
</html>
