<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax Effect</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }
        .parallax {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        .layer {
            position: absolute;
            width: 200%;
            height: 200%;
            background-size: cover;
        }
        .layer.back {
/*          background-image: url('background.jpg');*/
/*          background-image: url('test.png');*/
            background-image: url('tree.gif');
            transform: translateZ(-2px) scale(3);
        }
        .layer.front {
/*          background-image: url('foreground.png');*/
            background-image: url('tree.gif');
            transform: translateZ(-1px) scale(2);
        }
    </style>
</head>
<body>
    <div class="parallax">
        <div class="layer back"></div>
        <div class="layer front"></div>
    </div>
    <script>
        const parallax = document.querySelector('.parallax');

        parallax.addEventListener('mousemove', function(event) {
            const x = (event.clientX / window.innerWidth) - 0.5;
            const y = (event.clientY / window.innerHeight) - 0.5;

            const backLayer = document.querySelector('.layer.back');
            const frontLayer = document.querySelector('.layer.front');

            backLayer.style.transform = `translateX(${x * 20}px) translateY(${y * 20}px)`;
            frontLayer.style.transform = `translateX(${x * 40}px) translateY(${y * 40}px)`;
        });
    </script>
</body>
</html>
